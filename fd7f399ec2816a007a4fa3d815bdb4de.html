                    { name: "热身：椭圆机", detail: "5分钟，阻力3-4", sets: "1组" },
                    { name: "杠铃深蹲/史密斯深蹲", detail: "股四头肌+臀大肌 | 4组×10-12次", sets: "4组" },
                    { name: "罗马尼亚硬拉", detail: "腘绳肌+臀部 | 4组×12次 | 膝盖微屈", sets: "4组" },
                    { name: "保加利亚分腿蹲", detail: "单腿力量 | 3组×10次/腿 | 可扶支撑", sets: "3组" },
                    { name: "腿举机", detail: "股四头肌 | 3组×15次 | 不要锁死膝盖", sets: "3组" },
                    { name: "臀桥/臀推", detail: "臀大肌 | 4组×15次 | 顶峰停留2秒", sets: "4组" },
                    { name: "坐姿腿弯举", detail: "腘绳肌 | 3组×15次 | 控制速度", sets: "3组" },
                    { name: "提踵（小腿）", detail: "小腿肌群 | 3组×20次 | 可负重", sets: "3组" },
                    { name: "死虫式", detail: "核心稳定 | 3组×10次/侧 | 腰贴地面", sets: "3组" },
                    { name: "拉伸放松", detail: "臀、腿、髋拉伸 | 每个动作30秒", sets: "1组" }
                ]
            }
        ];

        // 其他日子有氧建议
        const cardioDays = [
            { day: 1, name: "周一", activity: "快走/慢跑 30分钟 | 心率120-130", type: "有氧" },
            { day: 2, name: "周二", activity: "休息日 | 可散步6000步", type: "休息" },
            { day: 4, name: "周四", activity: "快走 40分钟 | 坡度走更佳", type: "有氧" },
            { day: 6, name: "周六", activity: "瑜伽/拉伸 30分钟 | 或游泳", type: "恢复" },
            { day: 7, name: "周日", activity: "完全休息 | 准备下周", type: "休息" }
        ];

        let currentDietDay = 1;
        let currentWorkoutDay = 3;
        let completedDays = JSON.parse(localStorage.getItem('completedDays') || '[]');
        let completedExercises = JSON.parse(localStorage.getItem('completedExercises') || '{}');

        // 初始化
        function init() {
            renderDietCalendar();
            renderWorkoutCalendar();
            showDietDay(1);
            showWorkoutDay(3);
            updateProgress();
        }

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        // 渲染饮食日历
        function renderDietCalendar() {
            const calendar = document.getElementById('dietCalendar');
            calendar.innerHTML = '';
            
            for (let i = 1; i <= 7; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${i === currentDietDay ? 'active' : ''} ${completedDays.includes('diet-'+i) ? 'completed' : ''}`;
                dayDiv.innerHTML = `
                    <div class="day-number">${i}</div>
                    <div class="day-status">${completedDays.includes('diet-'+i) ? '✓' : ''}</div>
                `;
                dayDiv.onclick = () => {
                    currentDietDay = i;
                    renderDietCalendar();
                    showDietDay(i);
                };
                calendar.appendChild(dayDiv);
            }
        }

        // 渲染训练日历
        function renderWorkoutCalendar() {
            const calendar = document.getElementById('workoutCalendar');
            calendar.innerHTML = '';
            
            const workoutDays = [3, 5];
            const dayNames = ['一', '二', '三', '四', '五', '六', '日'];
            
            for (let i = 1; i <= 7; i++) {
                const isWorkoutDay = workoutDays.includes(i);
                const dayDiv = document.createElement('div');
                dayDiv.className = `calendar-day ${i === currentWorkoutDay ? 'active' : ''} ${completedDays.includes('workout-'+i) ? 'completed' : ''}`;
                if (!isWorkoutDay) dayDiv.style.opacity = '0.5';
                
                dayDiv.innerHTML = `
                    <div class="day-number">${dayNames[i-1]}</div>
                    <div class="day-status">${isWorkoutDay ? (completedDays.includes('workout-'+i) ? '✓' : '💪') : (i === 2 || i === 7 ? '休' : '走')}</div>
                `;
                
                if (isWorkoutDay) {
                    dayDiv.onclick = () => {
                        currentWorkoutDay = i;
                        renderWorkoutCalendar();
                        showWorkoutDay(i);
                    };
                }
                calendar.appendChild(dayDiv);
            }
        }

        // 显示指定天的饮食
        function showDietDay(day) {
            const plan = dietPlan.find(p => p.day === day);
            const content = document.getElementById('dietContent');
            
            let mealsHtml = plan.meals.map(meal => `
                <div class="meal-section">
                    <div class="meal-title">
                        <span class="meal-icon">${meal.icon}</span>
                        ${meal.name}
                    </div>
                    ${meal.foods.map(food => `
                        <div class="food-item">
                            <span class="food-name">${food.name}</span>
                            <span class="food-gram">${food.gram}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
            
            content.innerHTML = `
                <div class="day-card">
                    <div class="day-header">
                        <div class="day-title">${plan.name}</div>
                        <div class="day-check ${completedDays.includes('diet-'+day) ? 'checked' : ''}" onclick="toggleDietDay(${day})">
                            ${completedDays.includes('diet-'+day) ? '✓' : ''}
                        </div>
                    </div>
                    <div style="font-size: 12px; color: #636e72; margin-bottom: 10px;">
                        总热量：~1450kcal | 蛋白质：~110g | 碳水：~130g | 脂肪：~45g
                    </div>
                </div>
                ${mealsHtml}
                <div class="tips-box">
                    <strong>💡 今日重点</strong>
                    ${day === 3 || day === 5 ? '训练日！练前1.5小时吃加餐，练后30分钟内吃完晚餐。' : 
                      day === 2 || day === 7 ? '休息日，保持轻度活动，严格控制饮食。' : 
                      '有氧日，餐前30分钟完成运动，多喝水！'}
                </div>
            `;
        }

        // 显示指定天的训练
        function showWorkoutDay(day) {
            const content = document.getElementById('workoutContent');
            const workout = workoutPlan.find(w => w.day === day);
            
            if (!workout) {
                // 显示有氧/休息日
                const cardio = cardioDays.find(c => c.day === day);
                content.innerHTML = `
                    <div class="workout-card" style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);">
                        <div class="workout-type" style="color: #d63031;">${cardio.name}：${cardio.type}</div>
                        <div class="workout-subtitle">${cardio.activity}</div>
                        <div style="background: white; border-radius: 10px; padding: 15px; margin-top: 15px;">
                            <div style="font-weight: 600; margin-bottom: 10px;">📝 执行要点：</div>
                            <ul style="font-size: 13px; color: #636e72; padding-left: 18px; line-height: 1.8;">
                                <li>保持心率在燃脂区间（220-43）×60%~70% = <strong>106-124次/分</strong></li>
                                <li>呼吸均匀，能说话但不能唱歌的强度</li>
                                <li>穿舒适的运动鞋，保护膝盖</li>
                                <li>运动后及时补充水分</li>
                            </ul>
                        </div>
                    </div>
                    <div class="day-card" style="margin-top: 15px;">
                        <div class="day-header">
                            <div class="day-title">完成打卡</div>
                            <div class="day-check ${completedDays.includes('workout-'+day) ? 'checked' : ''}" onclick="toggleWorkoutDay(${day})">
                                ${completedDays.includes('workout-'+day) ? '✓' : ''}
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            const key = 'workout-' + day;
            const completed = completedExercises[key] || [];
            
            let exercisesHtml = workout.exercises.map((ex, idx) => `
                <div class="exercise-item">
                    <div class="exercise-info">
                        <div class="exercise-name">${ex.name}</div>
                        <div class="exercise-detail">${ex.detail}</div>
                    </div>
                    <div class="exercise-check ${completed.includes(idx) ? 'checked' : ''}" onclick="toggleExercise(${day}, ${idx})">
                        ${completed.includes(idx) ? '✓' : ''}
                    </div>
                </div>
            `).join('');
            
            content.innerHTML = `
                <div class="workout-card">
                    <div class="day-header" style="margin-bottom: 15px;">
                        <div>
                            <div class="workout-type">${workout.name}</div>
                            <div class="workout-subtitle">${workout.subtitle}</div>
                        </div>
                        <div class="day-check ${completedDays.includes('workout-'+day) ? 'checked' : ''}" onclick="toggleWorkoutDay(${day})" style="border-color: #0984e3; background: ${completedDays.includes('workout-'+day) ? '#0984e3' : 'white'}; color: ${completedDays.includes('workout-'+day) ? 'white' : 'transparent'};">
                            ${completedDays.includes('workout-'+day) ? '✓' : ''}
                        </div>
                    </div>
                </div>
                ${exercisesHtml}
                <div class="tips-box">
                    <strong>⚠️ 安全提示</strong>
                    43岁训练重点：热身充分、动作标准优先于重量、注意膝盖和腰椎保护、有任何疼痛立即停止。建议初次训练请教练指导动作！
                </div>
            `;
        }

        // 切换饮食打卡
        function toggleDietDay(day) {
            const key = 'diet-' + day;
            const idx = completedDays.indexOf(key);
            if (idx > -1) {
                completedDays.splice(idx, 1);
            } else {
                completedDays.push(key);
            }
            localStorage.setItem('completedDays', JSON.stringify(completedDays));
            renderDietCalendar();
            showDietDay(day);
            updateProgress();
        }

        // 切换训练打卡
        function toggleWorkoutDay(day) {
            const key = 'workout-' + day;
            const idx = completedDays.indexOf(key);
            if (idx > -1) {
                completedDays.splice(idx, 1);
            } else {
                completedDays.push(key);
            }
            localStorage.setItem('completedDays', JSON.stringify(completedDays));
            renderWorkoutCalendar();
            showWorkoutDay(day);
            updateProgress();
        }

        // 切换单个动作打卡
        function toggleExercise(day, exerciseIdx) {
            const key = 'workout-' + day;
            if (!completedExercises[key]) {
                completedExercises[key] = [];
            }
            
            const idx = completedExercises[key].indexOf(exerciseIdx);
            if (idx > -1) {
                completedExercises[key].splice(idx, 1);
            } else {
                completedExercises[key].push(exerciseIdx);
            }
            
            localStorage.setItem('completedExercises', JSON.stringify(completedExercises));
            showWorkoutDay(day);
        }

        // 更新进度
        function updateProgress() {
            const totalDays = 14;
            const progress = (completedDays.length / totalDays) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // 保存进度记录
        function saveProgress() {
            const weight = document.getElementById('weightInput').value;
            const waist = document.getElementById('waistInput').value;
            const note = document.getElementById('noteInput').value;
            
            if (weight) {
                document.getElementById('currentWeight').textContent = weight;
                
                const records = JSON.parse(localStorage.getItem('progressRecords') || '[]');
                records.push({
                    date: new Date().toLocaleDateString(),
                    weight: weight,
                    waist: waist,
                    note: note
                });
                localStorage.setItem('progressRecords', JSON.stringify(records));
                
                alert('记录已保存！继续保持！💪');
                document.getElementById('weightInput').value = '';
                document.getElementById('waistInput').value = '';
                document.getElementById('noteInput').value = '';
            } else {
                alert('请输入体重数据');
            }
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
